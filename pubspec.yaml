name: resq_flutter
description: ResQ Emergency Response Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1

  # UI & Styling
  google_fonts: ^6.1.0
  lucide_icons: ^0.257.0 # Using requested package
  flutter_markdown: ^0.6.14

  # AI & Services
  google_generative_ai: ^0.4.6
  tflite_flutter: ^0.12.1
  
  # Device Features
  geolocator: ^11.0.0
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  geocoding: ^4.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  firebase_storage: ^13.0.6
  cloudinary_public: ^0.23.1
  video_player: ^2.8.1
  connectivity_plus: ^5.0.2
  image: ^4.8.0
  speech_to_text: ^7.3.0
  uuid: ^4.3.3
  share_plus: ^10.1.4
  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  flutter_dotenv: ^6.0.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^17.2.1
  http: ^1.6.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/ml/
    - assets/images/first_aid/
